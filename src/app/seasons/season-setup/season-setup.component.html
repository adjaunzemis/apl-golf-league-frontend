<div class="container mx-auto p-4">
  <p-card header="Season Setup">
    <p-tabs [value]="0">
      <p-tablist>
        <p-tab [value]="0">Manage Seasons</p-tab>
        <p-tab [value]="1">League Dues (Stub)</p-tab>
      </p-tablist>
      <p-tabpanels>
        <p-tabpanel [value]="0">
          <div class="flex flex-col gap-6 pt-4">
            <!-- Create Season -->
            <div class="flex items-center gap-4 p-4 border rounded bg-gray-50 dark:bg-gray-800">
              <div class="flex flex-col gap-2">
                <label for="newYear" class="font-bold">New Season Year</label>
                <p-inputNumber
                  [(ngModel)]="newSeasonYear"
                  [useGrouping]="false"
                  id="newYear"
                  placeholder="Year"
                ></p-inputNumber>
              </div>
              <p-button
                label="Create Season"
                icon="pi pi-plus"
                (onClick)="onCreateSeason()"
                [loading]="loading"
                class="mt-6"
              ></p-button>
            </div>

            <!-- Seasons List -->
            <p-table [value]="seasons" [loading]="loading" responsiveLayout="scroll">
              <ng-template pTemplate="header">
                <tr>
                  <th>Year</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </ng-template>
              <ng-template pTemplate="body" let-season>
                <tr>
                  <td>{{ season.year }}</td>
                  <td>
                    @if (season.is_active) {
                      <p-tag severity="success" value="Active"></p-tag>
                    } @else {
                      <p-tag severity="secondary" value="Inactive"></p-tag>
                    }
                  </td>
                  <td>
                    @if (!season.is_active) {
                      <p-button
                        label="Set Active"
                        icon="pi pi-check"
                        size="small"
                        (onClick)="onSetActiveSeason(season.year)"
                        [loading]="loading"
                      >
                      </p-button>
                    }
                  </td>
                </tr>
              </ng-template>
            </p-table>
          </div>
        </p-tabpanel>

        <p-tabpanel [value]="1">
          <div class="flex flex-col gap-4 pt-4">
            <p class="text-gray-500 italic text-sm">
              League Dues entries for the selected season (UI Stub)
            </p>
            <p-table [value]="leagueDues" responsiveLayout="scroll">
              <ng-template pTemplate="header">
                <tr>
                  <th>Dues Type</th>
                  <th>Amount</th>
                  <th>Action</th>
                </tr>
              </ng-template>
              <ng-template pTemplate="body" let-due>
                <tr>
                  <td>{{ due.type }}</td>
                  <td>{{ due.amount | currency }}</td>
                  <td>
                    <p-button icon="pi pi-pencil" label="Edit" size="small" [disabled]="true"></p-button>
                  </td>
                </tr>
              </ng-template>
            </p-table>
            <div class="mt-4">
              <p-button label="Add Dues Entry" icon="pi pi-plus" [disabled]="true"></p-button>
            </div>
          </div>
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </p-card>
</div>
