@if (info) {
  <div class="flex flex-col gap-4 p-4">
    <!-- Row 1: Info (30%), Standings (40%), Divisions (30%) -->
    <div class="flex flex-col xl:flex-row gap-4 items-stretch justify-center">
      @if (info) {
        <app-flight-info class="w-full xl:w-[calc(30%-0.5rem)]" [info]="info" />
      }
      @if (standings) {
        <app-flight-standings class="w-full xl:w-[calc(40%-1rem)]" [standings]="standings" />
      }
      @if (divisions) {
        <app-flight-divisions
          class="hidden xl:block xl:w-[calc(30%-0.5rem)]"
          [divisions]="divisions"
        />
      }
    </div>

    <!-- Row 2: Schedule (Full Width) -->
    @if (matches && info) {
      <div class="flex justify-center w-full">
        <app-flight-schedule class="w-full" [info]="info" [matches]="matches" />
      </div>
    }

    <!-- Row 3: Teams (33%), Statistics (67%) -->
    <div class="flex flex-col xl:flex-row gap-4 items-stretch justify-center">
      @if (teams && substitutes) {
        <app-flight-teams
          class="w-full xl:w-[calc(33.333%-0.333rem)]"
          [teams]="teams"
          [substitutes]="substitutes"
        />
      }
      @if (statistics) {
        <app-flight-statistics
          class="w-full xl:w-[calc(66.666%-0.666rem)]"
          [statistics]="statistics"
        />
      }
    </div>
  </div>
} @else {
  <div class="flex flex-col items-center w-full p-10">
    <p-progress-spinner
      strokeWidth="4"
      fill="transparent"
      animationDuration="2s"
      [style]="{ width: '100px', height: '100px' }"
    />
  </div>
}
