@if (info && divisions && teams && standings && statistics) {
  <div class="flex flex-col gap-4 p-4">
    <!-- Row 1: Info (30%), Standings (40%), Divisions (30%) -->
    <div class="flex flex-col xl:flex-row gap-4 items-stretch justify-center">
      @if (info) {
        <app-tournament-info class="w-full xl:w-[calc(30%-0.5rem)]" [info]="info" />
      }
      @if (standings) {
        <app-tournament-standings
          class="w-full xl:w-[calc(40%-1rem)]"
          [standings]="standings"
          (teamSelected)="onTeamSelected($event)"
        />
      }
      @if (divisions) {
        <app-tournament-divisions
          class="hidden xl:block xl:w-[calc(30%-0.5rem)]"
          [divisions]="divisions"
        />
      }
    </div>

    <!-- Row 2: Selected Team Scorecard (Full Width) -->
    @if (selectedTeamRounds) {
      <div class="flex justify-center w-full">
        <div class="w-full xl:w-2/3">
          <app-tournament-scorecard [info]="info" [rounds]="selectedTeamRounds" />
        </div>
      </div>
    }

    <!-- Row 3: Teams (33%), Statistics (67%) -->
    <div class="flex flex-col xl:flex-row gap-4 items-stretch justify-center">
      @if (teams) {
        <app-tournament-teams class="w-full xl:w-[calc(33.333%-0.333rem)]" [teams]="teams" />
      }
      @if (statistics) {
        <app-tournament-statistics
          class="w-full xl:w-[calc(66.666%-0.666rem)]"
          [statistics]="statistics"
        />
      }
    </div>
  </div>
} @else {
  <div class="flex flex-col items-center w-full p-10">
    <p-progress-spinner
      strokeWidth="4"
      fill="transparent"
      animationDuration="2s"
      [style]="{ width: '100px', height: '100px' }"
    />
  </div>
}
