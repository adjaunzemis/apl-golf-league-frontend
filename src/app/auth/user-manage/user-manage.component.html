<div class="flex flex-0 justify-center w-full py-4">
  <p-card>
    <div class="flex flex-1 flex-col px-4 pt-4">
      <span class="text-2xl font-semibold">User Management</span>
      <span class="italic pt-2">Change User Password</span>
    </div>

    <div class="flex flex-col flex-2 w-full items-center p-4" [formGroup]="manageFormGroup">
      <div class="py-4 w-full">
        <p-floatlabel variant="on">
          <input
            pInputText
            id="username"
            formControlName="usernameControl"
            autocomplete="off"
            class="w-full"
          />
          <label for="username">Username</label>
        </p-floatlabel>
      </div>

      <div class="py-4 w-full">
        <p-floatlabel variant="on">
          <input
            type="password"
            pInputText
            id="currentPassword"
            formControlName="currentPasswordControl"
            autocomplete="off"
            class="w-full"
          />
          <label for="currentPassword">Current Password</label>
        </p-floatlabel>
      </div>

      <div class="py-4 w-full">
        <p-floatlabel variant="on">
          <p-password
            id="newPassword"
            formControlName="newPasswordControl"
            [toggleMask]="true"
            [feedback]="false"
            class="w-full"
            styleClass="w-full"
            inputStyleClass="w-full"
          ></p-password>
          <label for="newPassword">New Password</label>
        </p-floatlabel>
      </div>

      <div class="py-4 w-full">
        <p-floatlabel variant="on">
          <p-password
            id="confirmNewPassword"
            formControlName="confirmNewPasswordControl"
            [toggleMask]="true"
            [feedback]="false"
            class="w-full"
            styleClass="w-full"
            inputStyleClass="w-full"
          ></p-password>
          <label for="confirmNewPassword">Confirm New Password</label>
        </p-floatlabel>
        @if (manageFormGroup.errors?.['passwordMismatch'] && manageFormGroup.get('confirmNewPasswordControl')?.touched) {
          <div class="mt-1">
            <small class="text-red-500">Passwords do not match.</small>
          </div>
        }
      </div>

      <p-button
        class="font-semibold pt-4"
        [disabled]="manageFormGroup.invalid"
        (click)="onSubmit()"
      >
        Submit
      </p-button>
    </div>
  </p-card>
</div>
