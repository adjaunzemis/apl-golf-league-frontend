@if (!isLoading) {
  <div class="flex flex-col xl:flex-row gap-4 p-4">
    <!-- Left Column: 60% width on XL -->
    <div class="flex flex-col gap-4 w-full xl:w-[calc(60%-0.5rem)]">
      <!-- Row 1: Info/Season (20% total) and Statistics (40% total) -->
      <div class="flex flex-col xl:flex-row gap-4 items-stretch">
        <div class="flex flex-col gap-4 w-full xl:w-[calc(33.333%-0.5rem)]">
          @if (golfer) {
            <app-golfer-info [golfer]="golfer" />
          }
          <p-card>
            <div class="flex flex-1 items-center">
              <span class="text-lg font-semibold">Season</span>
              <div class="mx-auto"></div>
              <p-select
                class="ring-1 ring-gray-300 text-center ml-4"
                [options]="seasons"
                [(ngModel)]="selectedSeason"
                optionLabel="year"
                placeholder="Season"
                (onChange)="onSeasonSelected()"
              >
                <ng-template #selectedItem let-selectedOption>
                  @if (selectedOption) {
                    <div class="flex items-center gap-2">
                      <span>{{ selectedOption.year }}</span>
                      @if (selectedOption.is_active) {
                        <p-tag value="Active" severity="info" />
                      }
                    </div>
                  }
                </ng-template>
                <ng-template let-option #item>
                  <div class="flex items-center gap-2">
                    <span>{{ option.year }}</span>
                    @if (option.is_active) {
                      <p-tag value="Active" severity="info" />
                    }
                  </div>
                </ng-template>
              </p-select>
            </div>
          </p-card>
        </div>

        @if (statistics) {
          <app-golfer-statistics
            class="w-full xl:w-[calc(66.666%-0.5rem)]"
            [statistics]="statistics"
          />
        }
      </div>

      <!-- Row 2: Teams (20% total) and Handicap (40% total) -->
      <div class="flex flex-col xl:flex-row gap-4 items-stretch">
        <app-golfer-teams
          class="w-full xl:w-[calc(33.333%-0.5rem)]"
          [teams]="teams"
          [flightInfo]="flightInfo"
          [tournamentInfo]="tournamentInfo"
        />
        <app-golfer-handicap
          class="w-full xl:w-[calc(66.666%-0.5rem)]"
          [golfer]="golfer"
          [scoringRecord]="golferHandicapScoringRecord"
        />
      </div>
    </div>

    <!-- Right Column: Rounds (40% width on XL) -->
    <app-golfer-rounds
      class="w-full xl:w-[calc(40%-0.5rem)]"
      [rounds]="rounds"
    />
  </div>
} @else {
  <div class="flex flex-col items-center w-full p-10">
    <p-progress-spinner
      strokeWidth="4"
      fill="transparent"
      animationDuration="2s"
      [style]="{ width: '100px', height: '100px' }"
    />
  </div>
}
