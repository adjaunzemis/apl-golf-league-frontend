<table class="styled-table">
  <thead>
    <tr class="hole">
      <td class="label">
        @if (showScoreModeButtons) {
        <p-select
          [(ngModel)]="selectedScoreMode"
          (onChange)="onChangeScoreMode()"
          [options]="scoreModes"
          size="small" />
        }
      </td>
      @for (hole of holes; track hole.number) {
        <td class="hole">{{ hole.number }}</td>
      }
      <td class="total">TOT</td>
    </tr>
  </thead>
</table>
