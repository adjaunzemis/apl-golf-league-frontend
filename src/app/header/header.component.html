<p-menubar [model]="items">
  <ng-template #start>
    <p-image src="assets/apl_golf_logo.png" alt="APL Golf League" routerLink="/" />
  </ng-template>

  <ng-template #item let-item>
    @if (item.visible) {
      @if (item.route) {
        <a class="p-menubar-item-link" [routerLink]="item.route">
          <span [class]="item.icon"></span>
          <span>{{ item.label }}</span>
        </a>
      } @else if (item.url) {
        <a class="p-menubar-item-link" [href]="item.url">
          <span [class]="item.icon"></span>
          <span>{{ item.label }}</span>
        </a>
      } @else if (item.callback) {
        <button class="p-menubar-item-link" (click)="item.callback()">
          <span [class]="item.icon"></span>
          <span>{{ item.label }}</span>
        </button>
      } @else {
        <div class="p-menubar-item-link">
          <span [class]="item.icon"></span>
          <span>{{ item.label }}</span>
          <span class="pi pi-fw pi-angle-down"></span>
        </div>
      }
    }
  </ng-template>

  <ng-template #end>
    <div class="flex flex-row items-center mx-4">
      <p-button class="pr-4" (click)="themeService.toggleTheme()">
        @if (themeService.isDark()) {
          <span class="pi pi-moon"></span>
        }
        @if (!themeService.isDark()) {
          <span class="pi pi-sun"></span>
        }
      </p-button>
      @if (isAuthenticated) {
        <!-- TODO: Add profile page here? Routerlink: /auth/user -->
        <button class="p-menubar-item-link" (click)="onLogout()">
          <span class="pi pi-sign-out"></span>
          <span>Logout</span>
        </button>
      } @else {
        <a class="p-menubar-item-link" routerLink="/auth/login">
          <span class="pi pi-sign-in"></span>
          <span>Login</span>
        </a>
      }
    </div>
  </ng-template>
</p-menubar>
